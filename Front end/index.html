<script>
// ── Navigation helpers ──────────────────────────────
function openDetails(slug) {  window.location.href = 'details.html?slug=' + encodeURIComponent(slug);}
function handleBook(slug) { openDetails(slug); }

// ── Render a single service card ───────────────────
function renderCard(svc) {
  const categoryClass = svc.category === 'Physical' ? 'Physical' : 'Digital';
  const price = svc.priceUnit === 'per hour' ? '$' + svc.price + '/hr' : '$' + svc.price;
  const img   = svc.imageURL || 'https://placehold.co/600x400/eb4c4c/ffffff?text=Service';
  const avatar = svc.providerPhotoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(svc.providerName || 'P') + '&background=eb4c4c&color=fff';
  
  return (
    '<div class="group bg-white dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 cursor-pointer text-left"' +
    ' onclick="openDetails(\'' + svc.slug + '\')"' +
    ' role="button" tabindex="0"' +
    ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openDetails(\'' + svc.slug + '\')}"' +
    ' aria-label="View details for ' + svc.title + '">' +
    '<div class="relative aspect-[16/10] overflow-hidden">' +
      '<img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" src="' + img + '" alt="' + svc.title + '"/>' +
      '<div class="absolute top-2 left-2 bg-white/95 dark:bg-slate-900/90 backdrop-blur px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-wider text-primary border border-primary/5">' + categoryClass + '</div>' +
    '</div>' +
    '<div class="p-3">' +
      '<div class="flex items-center gap-1.5 mb-1.5">' +
        '<img class="size-4 rounded-full object-cover" src="' + avatar + '" alt="' + (svc.providerName || '') + '"/>' +
        '<span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter truncate">' + (svc.providerName || 'Provider') + '</span>' +
        '<div class="ml-auto flex items-center gap-0.5 text-[9px] font-bold text-yellow-600">' +
          '<span class="material-symbols-outlined filled !text-[10px]">star</span>' +
          (svc.rating || 0).toFixed(1) +
        '</div>' +
      '</div>' +
      '<h3 class="font-bold text-xs mb-1 group-hover:text-primary transition-colors line-clamp-1 h-[1rem] leading-tight">' + svc.title + '</h3>' +
      '<p class="text-[10px] text-slate-500 line-clamp-2 mb-2 leading-snug h-[1.75rem]">' + svc.description + '</p>' +
      '<div class="flex items-center justify-between pt-2 border-t border-slate-50 dark:border-slate-700">' +
        '<div class="flex flex-col min-w-0">' +
          '<span class="text-[8px] text-slate-300 uppercase font-black tracking-tighter">Starts from</span>' +
          '<span class="text-xs font-black text-primary truncate tracking-tight">' + price + '</span>' +
        '</div>' +
        '<button onclick="event.stopPropagation();handleBook(\'' + svc.slug + '\')"' +
          ' class="bg-primary/10 hover:bg-primary hover:text-white text-primary px-2.5 py-1.5 rounded text-[9px] font-black uppercase tracking-tighter transition-all">View Details</button>' +
      '</div>' +
    '</div>' +
    '</div>'
  );
}

// ── Inline service data ────
var SERVICES_DATA = [
  {id:"svc_001",slug:"web-design-responsive",title:"Responsive Web Design",description:"Custom responsive website design with modern UI/UX principles. Mobile-first approach.",category:"Digital",price:85,priceUnit:"per hour",rating:4.9,imageURL:"https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&h=400&fit=crop",providerName:"Alex Rivera"},
  {id:"svc_002",slug:"electrical-wiring-installation",title:"Electrical Wiring & Installation",description:"Professional electrical wiring, circuit installation, and home upgrades. Licensed and insured.",category:"Physical",price:65,priceUnit:"per hour",rating:4.8,imageURL:"https://images.unsplash.com/photo-1574604894657-262f2b878358?w=600&h=400&fit=crop",providerName:"Mike Thompson"},
  {id:"svc_003",slug:"social-media-content-strategy",title:"Social Media & Content Strategy",description:"Develop comprehensive social media strategy including content calendar and posting schedule.",category:"Digital",price:75,priceUnit:"per hour",rating:4.7,imageURL:"https://images.unsplash.com/photo-1611532736580-5ec40a4b3495?w=600&h=400&fit=crop",providerName:"Jessica Lee"},
  {id:"svc_004",slug:"plumbing-repairs-installation",title:"Plumbing Repairs & Installation",description:"Emergency plumbing repairs, fixture installation, leak detection. Available 24/7.",category:"Physical",price:80,priceUnit:"per hour",rating:4.6,imageURL:"https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=600&h=400&fit=crop",providerName:"David Chen"},
  {id:"svc_005",slug:"graphic-design-branding",title:"Graphic Design & Branding",description:"Logo design, brand identity, marketing materials. Professional design for your business.",category:"Digital",price:90,priceUnit:"per hour",rating:4.9,imageURL:"https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&h=400&fit=crop",providerName:"Sophie Martin"},
  {id:"svc_006",slug:"video-production-editing",title:"Video Production & Editing",description:"Professional video shoots, drone footage, color grading, and post-production editing.",category:"Digital",price:120,priceUnit:"per hour",rating:4.8,imageURL:"https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?w=600&h=400&fit=crop",providerName:"Marcus Johnson"}
];

async function loadServices() {
  const grid = document.getElementById('services-grid');
  if (grid) grid.innerHTML = SERVICES_DATA.map(renderCard).join('');
}

document.addEventListener('DOMContentLoaded', loadServices);
</script>
