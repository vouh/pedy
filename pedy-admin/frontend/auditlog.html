<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <script>
      !(function () {
        var t = localStorage.getItem("pedy_theme");
        (t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme:dark)").matches)) &&
          document.documentElement.classList.add("dark");
      })();
    </script>
    <title>Audit Log – PEDY Admin</title>
    <link rel="stylesheet" href="dist/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="theme.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
  </head>
  <body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans h-screen overflow-hidden"
  >
    <div id="sidebar-container"></div>
    <div class="lg:pl-64 h-screen overflow-y-auto flex flex-col">
      <div id="topbar-container"></div>
      <main class="flex-1 px-4 sm:px-6 py-6">
        <!-- Table card -->
        <div
          class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm"
        >
          <div
            class="flex flex-wrap items-center gap-3 px-5 py-4 border-b border-slate-100 dark:border-slate-700"
          >
            <h3 class="font-semibold text-sm flex-1">Audit Log</h3>
            <input
              id="searchQ"
              type="text"
              placeholder="Search action, admin, target…"
              oninput="loadLogs()"
              class="text-xs border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 w-52 bg-white dark:bg-slate-700 outline-none"
            />
            <select
              id="filterAction"
              onchange="loadLogs()"
              class="text-xs border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 bg-white dark:bg-slate-700 outline-none"
            >
              <option value="">All actions</option>
              <option value="user">User actions</option>
              <option value="service">Service actions</option>
              <option value="payment">Payment actions</option>
              <option value="review">Review actions</option>
              <option value="admin">Admin actions</option>
            </select>
            <div class="pedy-export-wrap relative">
              <button
                onclick="toggleExportMenu('exportMenuAudit')"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 text-xs font-semibold hover:border-primary hover:text-primary transition-colors"
              >
                <span class="material-symbols-outlined !text-xs">download</span>
                Export
                <span class="material-symbols-outlined !text-[10px]"
                  >expand_more</span
                >
              </button>
              <div
                id="exportMenuAudit"
                class="pedy-export-menu hidden absolute right-0 mt-1 w-36 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50 overflow-hidden"
              >
                <button
                  onclick="
                    exportLog();
                    toggleExportMenu('exportMenuAudit');
                  "
                  class="w-full flex items-center gap-2 px-4 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
                >
                  <span
                    class="material-symbols-outlined !text-base text-green-600"
                    >table_chart</span
                  >CSV
                </button>
                <button
                  onclick="
                    exportLogPDF();
                    toggleExportMenu('exportMenuAudit');
                  "
                  class="w-full flex items-center gap-2 px-4 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors border-t border-slate-100 dark:border-slate-700"
                >
                  <span
                    class="material-symbols-outlined !text-base text-red-500"
                    >picture_as_pdf</span
                  >PDF
                </button>
              </div>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr
                  class="text-left text-xs text-slate-400 border-b border-slate-100 dark:border-slate-700"
                >
                  <th class="px-5 py-3 font-semibold">Timestamp</th>
                  <th class="px-5 py-3 font-semibold">Admin</th>
                  <th class="px-5 py-3 font-semibold">Action</th>
                  <th class="px-5 py-3 font-semibold">Target</th>
                  <th class="px-5 py-3 font-semibold">IP</th>
                </tr>
              </thead>
              <tbody id="logsTable">
                <tr>
                  <td colspan="5" class="px-5 py-10 text-center text-slate-400">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="px-5 py-3"></div>
        </div>
      </main>
    </div>

    <script src="shared.js"></script>
    <script>
      let currentUser,
        currentPage = 1,
        allLogs = [];
      const PAGE_SIZE = 15;

      async function init() {
        currentUser = requireAuth();
        if (!currentUser) return;
        document.getElementById("sidebar-container").innerHTML = buildSidebar(
          currentUser,
          "auditlog",
        );
        document.getElementById("topbar-container").innerHTML = buildTopbar(
          "Audit Log",
          "Full record of admin actions",
        );
        loadLogs();
      }

      async function loadLogs(page = 1) {
        currentPage = page;
        const q = document.getElementById("searchQ").value;
        const action = document.getElementById("filterAction").value;
        const params = new URLSearchParams({ page, limit: PAGE_SIZE });
        if (q) params.set("q", q);
        if (action) params.set("action", action);
        const res = await apiFetch(`/auditlog?${params}`);
        if (!res) return;
        const { logs, total } = await res.json();
        allLogs = logs;

        const actionColor = (a) => {
          if (a.startsWith("user"))
            return "bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400";
          if (a.startsWith("service"))
            return "bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400";
          if (a.startsWith("payment"))
            return "bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400";
          if (a.startsWith("review"))
            return "bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400";
          if (a.startsWith("admin"))
            return "bg-red-100 text-primary dark:bg-red-900/30";
          return "bg-slate-100 text-slate-500";
        };

        document.getElementById("logsTable").innerHTML = logs.length
          ? logs
              .map(
                (l) => `
      <tr class="border-b border-slate-50 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
        <td class="px-5 py-3 text-xs text-slate-400 whitespace-nowrap">${new Date(l.createdAt).toLocaleString()}</td>
        <td class="px-5 py-3 font-medium text-sm">${l.adminName}</td>
        <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-mono font-semibold ${actionColor(l.action)}">${l.action}</span></td>
        <td class="px-5 py-3 text-slate-500 dark:text-slate-400 text-sm">${l.target}</td>
        <td class="px-5 py-3 text-xs text-slate-400 font-mono">${l.ip}</td>
      </tr>`,
              )
              .join("")
          : `<tr><td colspan="5" class="px-5 py-10 text-center text-slate-400">No log entries found.</td></tr>`;

        document.getElementById("pagination").innerHTML = createPagination(
          total,
          currentPage,
          PAGE_SIZE,
          loadLogs,
        );
      }

      function exportLog() {
        exportCSV(
          "auditlog.csv",
          ["Timestamp", "Admin", "Action", "Target", "IP"],
          allLogs.map((l) => [
            l.createdAt,
            l.adminName,
            l.action,
            l.target,
            l.ip,
          ]),
        );
      }

      function exportLogPDF() {
        exportPDF(
          "auditlog.pdf",
          "Audit Log Report",
          ["Timestamp", "Admin", "Action", "Target", "IP"],
          allLogs.map((l) => [
            l.createdAt,
            l.adminName,
            l.action,
            l.target,
            l.ip,
          ]),
        );
      }

      init();
    </script>
  </body>
</html>
