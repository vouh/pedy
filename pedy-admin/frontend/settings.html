<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <script>
      !(function () {
        var t = localStorage.getItem("pedy_theme");
        (t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme:dark)").matches)) &&
          document.documentElement.classList.add("dark");
      })();
    </script>
    <title>Settings – PEDY Admin</title>
    <link rel="stylesheet" href="dist/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans h-screen overflow-hidden"
  >
    <div id="sidebar-container"></div>
    <div class="lg:pl-64 h-screen overflow-y-auto flex flex-col">
      <div id="topbar-container"></div>
      <main class="flex-1 px-4 sm:px-6 py-6 max-w-3xl">
        <!-- General Settings -->
        <div
          class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm mb-6"
        >
          <div
            class="px-6 py-4 border-b border-slate-100 dark:border-slate-700"
          >
            <h3 class="font-semibold text-sm flex items-center gap-2">
              <span class="material-symbols-outlined !text-base text-primary"
                >tune</span
              >General Settings
            </h3>
          </div>
          <div class="p-6 space-y-5" id="settingsForm">
            <div class="text-center text-slate-400 text-sm">Loading…</div>
          </div>
        </div>

        <!-- Danger zone -->
        <div
          class="bg-white dark:bg-slate-800 rounded-xl border border-primary/30 shadow-sm"
        >
          <div class="px-6 py-4 border-b border-primary/20">
            <h3
              class="font-semibold text-sm text-primary flex items-center gap-2"
            >
              <span class="material-symbols-outlined !text-base">warning</span
              >Danger Zone
            </h3>
          </div>
          <div class="p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-semibold">Maintenance Mode</p>
                <p class="text-xs text-slate-400">
                  Temporarily take the platform offline for maintenance.
                </p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input
                  type="checkbox"
                  id="maintenanceToggle"
                  class="sr-only peer"
                  onchange="toggleMaintenance(this.checked)"
                />
                <div
                  class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:ring-2 peer-focus:ring-primary/40 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"
                ></div>
              </label>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="shared.js"></script>
    <script>
      let currentUser,
        currentSettings = {};

      async function init() {
        currentUser = requireAuth();
        if (!currentUser) return;
        document.getElementById("sidebar-container").innerHTML = buildSidebar(
          currentUser,
          "settings",
        );
        document.getElementById("topbar-container").innerHTML = buildTopbar(
          "Settings",
          "Configure platform settings",
        );
        const res = await apiFetch("/settings");
        if (!res) return;
        currentSettings = await res.json();
        renderForm();
      }

      function renderForm() {
        const s = currentSettings;
        document.getElementById("settingsForm").innerHTML = `
    <div class="grid sm:grid-cols-2 gap-5">
      ${field("siteName", "Site Name", s.siteName, "text")}
      ${field("supportEmail", "Support Email", s.supportEmail, "email")}
      ${field("commissionRate", "Commission Rate (%)", s.commissionRate, "number")}
      ${field("maxServicesPerUser", "Max Services / User", s.maxServicesPerUser, "number")}
      ${field("currency", "Currency", s.currency, "text")}
      ${field("timezone", "Timezone", s.timezone, "text")}
    </div>
    <div class="flex items-center gap-3 mt-2">
      <label class="flex items-center gap-2 cursor-pointer text-sm">
        <input type="checkbox" id="allowRegistration" ${s.allowRegistration ? "checked" : ""} class="rounded" />
        Allow new registrations
      </label>
    </div>
    <div class="pt-2">
      <button onclick="saveSettings()" class="bg-primary text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-primary/90 transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined !text-base">save</span>Save Changes
      </button>
      <p id="saveMsg" class="text-xs mt-2 hidden"></p>
    </div>`;
        document.getElementById("maintenanceToggle").checked =
          s.maintenanceMode;
      }

      function field(id, label, value, type) {
        return `<div>
    <label class="text-xs text-slate-500 font-semibold block mb-1">${label}</label>
    <input id="${id}" type="${type}" value="${value}" class="w-full text-sm border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-700 outline-none focus:ring-2 focus:ring-primary/30" />
  </div>`;
      }

      async function saveSettings() {
        const payload = {
          siteName: document.getElementById("siteName").value,
          supportEmail: document.getElementById("supportEmail").value,
          commissionRate: Number(
            document.getElementById("commissionRate").value,
          ),
          maxServicesPerUser: Number(
            document.getElementById("maxServicesPerUser").value,
          ),
          currency: document.getElementById("currency").value,
          timezone: document.getElementById("timezone").value,
          allowRegistration:
            document.getElementById("allowRegistration").checked,
        };
        const res = await apiFetch("/settings", {
          method: "PATCH",
          body: JSON.stringify(payload),
        });
        const msg = document.getElementById("saveMsg");
        if (res?.ok) {
          msg.textContent = "Settings saved successfully.";
          msg.className = "text-xs mt-2 text-green-600";
        } else {
          msg.textContent = "Failed to save. Please retry.";
          msg.className = "text-xs mt-2 text-primary";
        }
        msg.classList.remove("hidden");
        setTimeout(() => msg.classList.add("hidden"), 3000);
      }

      async function toggleMaintenance(enabled) {
        await apiFetch("/settings", {
          method: "PATCH",
          body: JSON.stringify({ maintenanceMode: enabled }),
        });
      }

      init();
    </script>
  </body>
</html>
