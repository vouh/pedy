<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>PEDY Admin – Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { "primary": "#eb4c4c", "background-light": "#f8f6f6", "background-dark": "#211111" },
          fontFamily: { "display": ["Inter"] },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .filled { font-variation-settings: 'FILL' 1; }
  </style>
  <script type="module" src="firebase-admin-init.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
  <div id="sidebarContainer"></div>

  <div class="lg:pl-64 min-h-screen flex flex-col">
    <div id="topbarContainer"></div>

    <main class="flex-1 px-6 py-8 max-w-[1200px] w-full mx-auto">

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
        <!-- Total Users -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 flex items-center gap-4">
          <div class="size-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
            <span class="material-symbols-outlined !text-2xl">group</span>
          </div>
          <div>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Total Users</p>
            <p id="stat-users" class="text-2xl font-bold mt-0.5">—</p>
            <p id="stat-users-sub" class="text-xs text-slate-400 font-semibold mt-0.5">loading…</p>
          </div>
        </div>
        <!-- Active Providers -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 flex items-center gap-4">
          <div class="size-12 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
            <span class="material-symbols-outlined !text-2xl">storefront</span>
          </div>
          <div>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Active Providers</p>
            <p id="stat-providers" class="text-2xl font-bold mt-0.5">—</p>
            <p id="stat-providers-sub" class="text-xs text-slate-400 font-semibold mt-0.5">loading…</p>
          </div>
        </div>
        <!-- Total Bookings -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 flex items-center gap-4">
          <div class="size-12 rounded-xl bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center text-yellow-600 dark:text-yellow-500">
            <span class="material-symbols-outlined !text-2xl">calendar_month</span>
          </div>
          <div>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Total Bookings</p>
            <p id="stat-bookings" class="text-2xl font-bold mt-0.5">—</p>
            <p id="stat-bookings-sub" class="text-xs text-slate-400 font-semibold mt-0.5">loading…</p>
          </div>
        </div>
        <!-- Revenue -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 flex items-center gap-4">
          <div class="size-12 rounded-xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400">
            <span class="material-symbols-outlined !text-2xl">payments</span>
          </div>
          <div>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Platform Revenue</p>
            <p id="stat-revenue" class="text-2xl font-bold mt-0.5">—</p>
            <p id="stat-revenue-sub" class="text-xs text-slate-400 font-semibold mt-0.5">loading…</p>
          </div>
        </div>
      </div>

      <!-- Two-column middle section -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">

        <!-- Pending Actions -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
          <h3 class="font-bold text-base mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">pending_actions</span>
            Pending Actions
          </h3>
          <div class="space-y-3" id="pendingActions">
            <!-- Injected by JS based on role -->
          </div>
        </div>

        <!-- Recent Signups -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
          <h3 class="font-bold text-base mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">person_add</span>
            Recent Signups
          </h3>
          <ul class="space-y-3" id="recentSignups">
            <li class="text-sm text-slate-400 italic">Loading…</li>
          </ul>
        </div>
      </div>

      <!-- Recent Activity Log -->
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
        <h3 class="font-bold text-base mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">history</span>
          Activity Log
        </h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-slate-400 uppercase tracking-wider border-b border-slate-100 dark:border-slate-700">
                <th class="text-left py-2 pr-4 font-semibold">Admin</th>
                <th class="text-left py-2 pr-4 font-semibold">Action</th>
                <th class="text-left py-2 pr-4 font-semibold">Target</th>
                <th class="text-left py-2 font-semibold">Date</th>
              </tr>
            </thead>
            <tbody id="activityLog" class="divide-y divide-slate-100 dark:divide-slate-700">
              <tr><td colspan="4" class="py-4 text-sm text-slate-400 italic">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="shared.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      document.getElementById("sidebarContainer").innerHTML = buildSidebar(user, "dashboard");
      document.getElementById("topbarContainer").innerHTML = buildTopbar("Dashboard", "Welcome back, " + user.name);

      // ── Fetch live analytics ──────────────────────────────────────────────
      apiFetch("/analytics").then(async (res) => {
        if (!res) return;
        const data = await res.json();
        const { users, services, bookings, payments } = data;

        // Stat cards
        document.getElementById("stat-users").textContent        = users.total.toLocaleString();
        document.getElementById("stat-users-sub").textContent    = `${users.providers} providers · ${users.pending} pending`;
        document.getElementById("stat-users-sub").className      = "text-xs text-slate-500 font-semibold mt-0.5";

        document.getElementById("stat-providers").textContent      = users.providers.toLocaleString();
        document.getElementById("stat-providers-sub").textContent  = `${users.clients} clients registered`;
        document.getElementById("stat-providers-sub").className    = "text-xs text-slate-500 font-semibold mt-0.5";

        document.getElementById("stat-bookings").textContent      = bookings.total.toLocaleString();
        document.getElementById("stat-bookings-sub").textContent  = `${bookings.pending} pending · ${bookings.completed} completed`;
        document.getElementById("stat-bookings-sub").className    = "text-xs text-slate-500 font-semibold mt-0.5";

        document.getElementById("stat-revenue").textContent      = `$${payments.revenue_usd.toLocaleString()}`;
        document.getElementById("stat-revenue-sub").textContent  = `${payments.total} txns · ${payments.disputed} disputed`;
        document.getElementById("stat-revenue-sub").className    = "text-xs text-slate-500 font-semibold mt-0.5";

        // Role-specific pending actions with live counts
        const actions = {
          admin: [
            { icon: "person_check", text: `${users.pending} provider${users.pending !== 1 ? "s" : ""} awaiting verification`, color: "text-primary",     href: "users.html" },
            { icon: "storefront",   text: `${services.pending} service${services.pending !== 1 ? "s" : ""} pending review`,   color: "text-blue-600",    href: "services.html" },
            { icon: "report",       text: `${payments.disputed} payment dispute${payments.disputed !== 1 ? "s" : ""} to resolve`, color: "text-green-700", href: "payments.html" },
            { icon: "flag",         text: `${payments.flagged} transaction${payments.flagged !== 1 ? "s" : ""} flagged`,       color: "text-orange-600",  href: "payments.html" },
          ],
          super_admin: [
            { icon: "person_check", text: `${users.pending} provider${users.pending !== 1 ? "s" : ""} awaiting verification`, color: "text-primary",     href: "users.html" },
            { icon: "storefront",   text: `${services.pending} service${services.pending !== 1 ? "s" : ""} pending review`,   color: "text-blue-600",    href: "services.html" },
            { icon: "report",       text: `${payments.disputed} payment dispute${payments.disputed !== 1 ? "s" : ""} to resolve`, color: "text-green-700", href: "payments.html" },
            { icon: "flag",         text: `${payments.flagged} transaction${payments.flagged !== 1 ? "s" : ""} flagged`,       color: "text-orange-600",  href: "payments.html" },
          ],
          content_moderator: [
            { icon: "person_check", text: `${users.pending} provider${users.pending !== 1 ? "s" : ""} awaiting verification`, color: "text-primary",    href: "users.html" },
            { icon: "storefront",   text: `${services.pending} service${services.pending !== 1 ? "s" : ""} pending review`,   color: "text-blue-600",   href: "services.html" },
          ],
          payment_manager: [
            { icon: "report",       text: `${payments.disputed} payment dispute${payments.disputed !== 1 ? "s" : ""} to resolve`, color: "text-green-700", href: "payments.html" },
            { icon: "warning",      text: `${payments.flagged} transaction${payments.flagged !== 1 ? "s" : ""} flagged`,       color: "text-red-600",    href: "payments.html" },
          ],
        };

        const items = actions[user.role] || [];
        document.getElementById("pendingActions").innerHTML = items.map(a => `
          <a href="${a.href}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors group">
            <div class="size-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center ${a.color} group-hover:bg-primary/10">
              <span class="material-symbols-outlined !text-base">${a.icon}</span>
            </div>
            <p class="text-sm font-medium flex-1">${a.text}</p>
            <span class="material-symbols-outlined !text-sm text-slate-300">chevron_right</span>
          </a>`).join("");
      }).catch(() => {
        document.getElementById("pendingActions").innerHTML =
          '<p class="text-sm text-slate-400 italic">Could not load data. Is the admin server running?</p>';
      });

      // ── Fetch recent signups ──────────────────────────────────────────────
      const bgColors = ["bg-primary/10 text-primary", "bg-blue-100 dark:bg-blue-900/30 text-blue-600",
                        "bg-green-100 dark:bg-green-900/30 text-green-700", "bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700",
                        "bg-purple-100 dark:bg-purple-900/30 text-purple-700"];
      apiFetch("/users?role=&status=&q=").then(async (res) => {
        if (!res) return;
        const data  = await res.json();
        const users = (data.users || []).slice(0, 5);
        document.getElementById("recentSignups").innerHTML = users.length
          ? users.map((u, i) => `
              <li class="flex items-center gap-3">
                <div class="size-8 rounded-full ${bgColors[i % bgColors.length]} flex items-center justify-center font-bold text-sm">${u.name.charAt(0)}</div>
                <div class="flex-1">
                  <p class="text-sm font-medium">${u.name}</p>
                  <p class="text-xs text-slate-400">${u.role.charAt(0).toUpperCase() + u.role.slice(1)} · ${u.location || "—"}</p>
                </div>
                <span class="text-xs text-slate-400">${u.joined}</span>
              </li>`).join("")
          : '<li class="text-sm text-slate-400 italic">No users yet.</li>';
      });

      // ── Fetch activity log ────────────────────────────────────────────────
      const ACTION_STYLES = {
        approved:   "bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400",
        rejected:   "bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400",
        removed:    "bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400",
        suspended:  "bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-400",
        reinstated: "bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400",
        refunded:   "bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-500",
        flagged:    "bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400",
        resolved:   "bg-teal-100 dark:bg-teal-900/30 text-teal-700 dark:text-teal-400",
      };
      const ROLE_CHIP = {
        admin:             "bg-primary/10 text-primary",
        super_admin:       "bg-primary/10 text-primary",
        content_moderator: "bg-blue-100 dark:bg-blue-900/30 text-blue-600",
        payment_manager:   "bg-green-100 dark:bg-green-900/30 text-green-700",
      };
      apiFetch("/activity?limit=8").then(async (res) => {
        if (!res) return;
        const { logs } = await res.json();
        document.getElementById("activityLog").innerHTML = logs.length
          ? logs.map((l) => {
              const chipStyle = ACTION_STYLES[l.action] || "bg-slate-100 dark:bg-slate-700 text-slate-600";
              const roleChip  = ROLE_CHIP[l.adminRole]  || "bg-slate-100 text-slate-500";
              return `
              <tr>
                <td class="py-3 pr-4">
                  <span class="flex items-center gap-2">
                    <span class="size-6 rounded-full ${roleChip} flex items-center justify-center text-xs font-bold">${l.adminName.charAt(0)}</span>
                    ${l.adminName}
                  </span>
                </td>
                <td class="py-3 pr-4">
                  <span class="text-xs font-semibold px-2 py-0.5 rounded-full capitalize ${chipStyle}">${l.action}</span>
                </td>
                <td class="py-3 pr-4 text-slate-500">${l.target}</td>
                <td class="py-3 text-slate-400 text-xs">${l.time}</td>
              </tr>`;
            }).join("")
          : '<tr><td colspan="4" class="py-4 text-sm text-slate-400 italic">No activity yet.</td></tr>';
      }).catch(() => {
        document.getElementById("activityLog").innerHTML =
          '<tr><td colspan="4" class="py-4 text-sm text-slate-400 italic">Could not load activity log.</td></tr>';
      });
    }
  </script>
</body>
</html>
