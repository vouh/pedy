<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PEDY Admin – Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#eb4c4c",
              "background-light": "#f8f6f6",
              "background-dark": "#211111",
            },
            fontFamily: { display: ["Inter"] },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .filled {
        font-variation-settings: "FILL" 1;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex items-center justify-center"
  >
    <div class="w-full max-w-md px-6">
      <!-- Logo -->
      <div class="flex items-center justify-center gap-3 mb-10">
        <div
          class="size-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30"
        >
          <span class="material-symbols-outlined !text-2xl filled"
            >diamond</span
          >
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">
            PEDY
          </h1>
          <p
            class="text-xs font-semibold text-primary uppercase tracking-widest"
          >
            Admin Panel
          </p>
        </div>
      </div>

      <!-- Card -->
      <div
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-8"
      >
        <h2 class="text-xl font-bold mb-1">Sign In</h2>
        <p class="text-sm text-slate-500 mb-6">
          Access is restricted to authorised administrators.
        </p>

        <!-- Role Badges -->
        <div class="flex gap-2 mb-6 flex-wrap">
          <span
            class="flex items-center gap-1 text-xs font-semibold bg-red-50 dark:bg-red-900/30 text-primary border border-primary/20 px-3 py-1 rounded-full"
          >
            <span class="material-symbols-outlined !text-sm">shield</span> Super
            Admin
          </span>
          <span
            class="flex items-center gap-1 text-xs font-semibold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 px-3 py-1 rounded-full"
          >
            <span class="material-symbols-outlined !text-sm"
              >manage_accounts</span
            >
            Content Moderator
          </span>
          <span
            class="flex items-center gap-1 text-xs font-semibold bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-800 px-3 py-1 rounded-full"
          >
            <span class="material-symbols-outlined !text-sm">payments</span>
            Payment Manager
          </span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
          <!-- Email -->
          <div>
            <label class="block text-sm font-medium mb-1.5" for="email"
              >Email address</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 !text-lg"
                >mail</span
              >
              <input
                id="email"
                type="email"
                required
                placeholder="admin@pedy.com"
                class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg py-3 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition"
              />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium mb-1.5" for="password"
              >Password</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 !text-lg"
                >lock</span
              >
              <input
                id="password"
                type="password"
                required
                placeholder="••••••••"
                class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg py-3 pl-10 pr-10 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition"
              />
              <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
              >
                <span id="eyeIcon" class="material-symbols-outlined !text-lg"
                  >visibility_off</span
                >
              </button>
            </div>
          </div>

          <!-- Error msg -->
          <div
            id="errorMsg"
            class="hidden text-xs text-red-600 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg px-3 py-2 flex items-center gap-2"
          >
            <span class="material-symbols-outlined !text-sm">error</span>
            <span id="errorText">Invalid credentials.</span>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg transition-all flex items-center justify-center gap-2 mt-2"
          >
            <span class="material-symbols-outlined !text-lg">login</span>
            Sign In
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-slate-400 mt-6">
        © 2026 PEDY Inc. — Admin access only.
      </p>
    </div>

    <script>
      const API_BASE = "http://localhost:4000/api/admin";

      async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");
        const errorMsg = document.getElementById("errorMsg");

        btn.disabled = true;
        btn.innerHTML =
          '<span class="material-symbols-outlined !text-lg">progress_activity</span> Signing in...';
        errorMsg.classList.add("hidden");

        try {
          const res = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (res.ok) {
            sessionStorage.setItem("pedy_admin", JSON.stringify(data.admin));
            sessionStorage.setItem("pedy_token", data.token);
            window.location.href = "dashboard.html";
          } else {
            throw new Error(data.error || "Invalid credentials");
          }
        } catch (err) {
          errorMsg.classList.remove("hidden");
          document.getElementById("errorText").textContent = err.message;
          btn.disabled = false;
          btn.innerHTML =
            '<span class="material-symbols-outlined !text-lg">login</span> Sign In';
        }
      }

      function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        if (input.type === "password") {
          input.type = "text";
          icon.textContent = "visibility";
        } else {
          input.type = "password";
          icon.textContent = "visibility_off";
        }
      }

      // Redirect if already logged in
      if (
        sessionStorage.getItem("pedy_admin") &&
        sessionStorage.getItem("pedy_token")
      ) {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
